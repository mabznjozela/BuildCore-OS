<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Rounded white background container suited for app icons -->
  <rect x="0" y="0" width="512" height="512" rx="96" fill="#ffffff" />
  
  <!-- Top Right Red Swoop Corner -->
  <path d="M 320,0 
           C 400,0 480,20 512,120 
           L 512,0 
           Z" 
        fill="#dc2626" />
        
  <!-- Bottom Left Red Swoop Corner -->
  <path d="M 0,380 
           C 0,460 70,512 180,512 
           L 0,512 
           Z" 
        fill="#dc2626" />

  <!-- Content Group centered horizontally and vertically -->
  <g transform="translate(16, 20)">
    <!-- 'Kitchen' Text -->
    <text x="60" y="255" 
          font-family="Inter, system-ui, -apple-system, sans-serif" 
          font-weight="800" 
          font-size="62" 
          fill="#4b5563" 
          letter-spacing="-1">Kitchen</text>

    <!-- Connected Red Heartbeat Waveform Line -->
    <!-- Starting from y=235 (near center of text height) -->
    <path d="M 288,235 
             L 315,235 
             L 321,215 
             L 327,235 
             L 333,235 
             L 340,175 
             L 348,275 
             L 356,210 
             L 362,245 
             L 368,235 
             L 395,235" 
          fill="none" 
          stroke="#dc2626" 
          stroke-width="5.5" 
          stroke-linecap="round" 
          stroke-linejoin="round" />

    <!-- 'Lab' Text -->
    <text x="400" y="255" 
          font-family="Inter, system-ui, -apple-system, sans-serif" 
          font-weight="900" 
          font-size="62" 
          fill="#000000" 
          letter-spacing="-1">Lab</text>
  </g>
</svg>
